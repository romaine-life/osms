loki:
  deploymentMode: SimpleScalable

  loki:
    auth_enabled: false
    podLabels:
      azure.workload.identity/use: "true"
    commonConfig:
      replication_factor: 1
    storage:
      type: azure
      bucketNames:
        chunks: loki-chunks
        ruler: loki-ruler
        admin: loki-admin
      azure:
        accountName: romainelokilogs
        useFederatedToken: true
    schemaConfig:
      configs:
        - from: "2024-04-01"
          store: tsdb
          object_store: azure
          schema: v13
          index:
            prefix: loki_index_
            period: 24h
    ingester:
      chunk_encoding: snappy
    limits_config:
      allow_structured_metadata: true
      volume_enabled: true
    compactor:
      delete_request_store: azure

  serviceAccount:
    name: loki
    annotations:
      azure.workload.identity/client-id: f70e25af-d292-4c50-a3f7-f381e90042ed

  singleBinary:
    replicas: 0

  read:
    replicas: 1
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        memory: 512Mi

  write:
    replicas: 1
    persistence:
      size: 10Gi
      storageClass: managed-csi
    resources:
      requests:
        cpu: 100m
        memory: 512Mi
      limits:
        memory: 1Gi

  backend:
    replicas: 1
    persistence:
      size: 10Gi
      storageClass: managed-csi
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        memory: 512Mi

  chunksCache:
    enabled: false
  resultsCache:
    enabled: false
  lokiCanary:
    enabled: false
  test:
    enabled: false

  gateway:
    enabled: true
    resources:
      requests:
        cpu: 25m
        memory: 64Mi
      limits:
        memory: 128Mi

alloy:
  crds:
    create: false

  alloy:
    enableReporting: false
    configMap:
      content: |-
        discovery.kubernetes "pod" {
          role = "pod"
        }

        discovery.relabel "pod_logs" {
          targets = discovery.kubernetes.pod.targets

          rule {
            source_labels = ["__meta_kubernetes_namespace"]
            action = "replace"
            target_label = "namespace"
          }

          rule {
            source_labels = ["__meta_kubernetes_pod_name"]
            action = "replace"
            target_label = "pod"
          }

          rule {
            source_labels = ["__meta_kubernetes_pod_container_name"]
            action = "replace"
            target_label = "container"
          }

          rule {
            source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_name"]
            action = "replace"
            target_label = "app"
          }

          rule {
            source_labels = ["__meta_kubernetes_namespace", "__meta_kubernetes_pod_container_name"]
            action = "replace"
            target_label = "job"
            separator = "/"
            replacement = "$1"
          }

          rule {
            source_labels = ["__meta_kubernetes_pod_uid", "__meta_kubernetes_pod_container_name"]
            action = "replace"
            target_label = "__path__"
            separator = "/"
            replacement = "/var/log/pods/*$1/*.log"
          }

          rule {
            source_labels = ["__meta_kubernetes_pod_container_id"]
            action = "replace"
            target_label = "container_runtime"
            regex = `^(\S+):\/\/.+$`
            replacement = "$1"
          }
        }

        loki.source.kubernetes "pod_logs" {
          targets = discovery.relabel.pod_logs.output
          forward_to = [loki.process.pod_logs.receiver]
        }

        loki.process "pod_logs" {
          stage.static_labels {
            values = {
              cluster = "infra-aks",
            }
          }

          forward_to = [loki.write.default.receiver]
        }

        loki.source.kubernetes_events "cluster_events" {
          job_name = "integrations/kubernetes/eventhandler"
          log_format = "logfmt"
          forward_to = [loki.process.cluster_events.receiver]
        }

        loki.process "cluster_events" {
          stage.static_labels {
            values = {
              cluster = "infra-aks",
            }
          }

          stage.labels {
            values = {
              kubernetes_cluster_events = "job",
            }
          }

          forward_to = [loki.write.default.receiver]
        }

        loki.write "default" {
          endpoint {
            url = "http://loki-gateway.loki.svc.cluster.local/loki/api/v1/push"
          }
        }
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        memory: 256Mi

  controller:
    type: deployment
    replicas: 1

  configReloader:
    resources:
      requests:
        cpu: 5m
        memory: 32Mi
      limits:
        memory: 64Mi
