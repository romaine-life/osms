apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-oauth
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: romaine-kv
    kind: ClusterSecretStore
  target:
    name: grafana-oauth
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      engineVersion: v2
      data:
        client-id: {{ "{{ .clientID }}" | quote }}
        client-secret: {{ "{{ .clientSecret }}" | quote }}
        allowed-emails: {{ "{{ .adminEmails }}" | quote }}
        role-attribute-path: {{ "{{ printf \"contains(['%s'], email) && 'Admin' || contains(['%s'], preferred_username) && 'Admin' || contains(['%s'], upn) && 'Admin' || ''\" (replace \",\" \"', '\" .adminEmails) (replace \",\" \"', '\" .adminEmails) (replace \",\" \"', '\" .adminEmails) }}" | quote }}
  data:
    - secretKey: clientID
      remoteRef:
        key: grafana-oauth-client-id
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
    - secretKey: adminEmails
      remoteRef:
        key: romaine-life-admin-emails
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
    - secretKey: clientSecret
      remoteRef:
        key: grafana-oauth-client-secret
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
