# Grafana's OIDC client credentials for auth.romaine.life. Synced from
# romaine-kv on a 1h cadence by external-secrets-operator. Matches the
# secret auth.romaine.life holds as OIDC_GRAFANA_CLIENT_SECRET — see
# nelsong6/auth#53; rotate both halves together.
#
# Pre-migration this Secret also held an `allowed-emails` allowlist and
# a templated role_attribute_path expression composed of admin emails.
# That logic now lives entirely on auth.romaine.life (the user.role
# column + the OIDC plugin's getAdditionalUserInfoClaim), surfaced as a
# `role` claim on the id_token. Grafana's role_attribute_path in
# values.yaml reads that claim directly — no per-Grafana copy of the
# allowlist required.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-oauth
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: romaine-kv
    kind: ClusterSecretStore
  target:
    name: grafana-oauth
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: client-id
      remoteRef:
        key: grafana-oidc-client-id
    - secretKey: client-secret
      remoteRef:
        key: grafana-oidc-client-secret
