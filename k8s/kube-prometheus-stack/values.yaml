externalSecret:
  storeName: ng6-osms
  storeKind: ClusterSecretStore
  vaultUrl: https://ng6-osms.vault.azure.net/

kube-prometheus-stack:
  # ------------------------------------------------------------------------
  # Grafana — bundled subchart
  # ------------------------------------------------------------------------
  # Previously deployed as its own ArgoCD app (osms/k8s/grafana). Folded in
  # here so one chart owns the whole metrics+dashboards stack and the ~30
  # bundled dashboards land automatically via the sidecar. Grafana lives in
  # the `monitoring` namespace alongside Prometheus.
  grafana:
    enabled: true

    # Keep the Service name as `grafana` so the HTTPRoute backendRef stays
    # stable and doesn't need to know the Helm release name.
    fullnameOverride: grafana

    replicas: 1
    deploymentStrategy:
      type: Recreate

    persistence:
      enabled: true
      type: pvc
      storageClassName: managed-csi
      accessModes:
        - ReadWriteOnce
      size: 10Gi

    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        memory: 512Mi

    admin:
      existingSecret: grafana-admin
      userKey: admin-user
      passwordKey: admin-password

    grafana.ini:
      server:
        domain: grafana.romaine.life
        root_url: https://grafana.romaine.life/
      analytics:
        reporting_enabled: false
        check_for_updates: false
      auth:
        disable_login_form: false
      # Browser SSO via auth.romaine.life. Previously pointed at Microsoft
      # directly; moved here so (a) we share one identity surface with the
      # rest of romaine.life and (b) the role allowlist lives in one place
      # (auth.romaine.life's user.role column, surfaced as the `role` claim
      # on the id_token). See romaine-life/auth#53.
      #
      # Endpoints under /api/auth/oauth2/* because Better Auth mounts the
      # OIDC provider plugin alongside its other routes. Discovery doc is
      # at /api/auth/.well-known/openid-configuration; Grafana doesn't
      # autodiscover so we set these explicitly.
      auth.generic_oauth:
        name: Romaine
        enabled: true
        allow_sign_up: true
        auto_login: false
        client_authentication: client_secret_post
        scopes: openid email profile
        email_attribute_path: email
        login_attribute_path: email
        name_attribute_path: name
        auth_url: https://auth.romaine.life/api/auth/oauth2/authorize
        token_url: https://auth.romaine.life/api/auth/oauth2/token
        api_url: https://auth.romaine.life/api/auth/oauth2/userinfo
        # role claim on the id_token is admin | user | pending (set by
        # auth.romaine.life's user.role column and surfaced via the OIDC
        # plugin's getAdditionalUserInfoClaim). `pending` users return an
        # empty role string, and role_attribute_strict: true means Grafana
        # refuses sign-in until they're promoted via the auth admin
        # console. Mirrors the previous "Microsoft email allowlist" gate
        # without the per-Grafana KV copy.
        role_attribute_path: "contains(['admin'], role) && 'Admin' || contains(['user', 'service'], role) && 'Viewer' || ''"
        role_attribute_strict: true
        allow_assign_grafana_admin: false
        skip_org_role_sync: false
        use_pkce: true
      # API-side auth for curl / scripts. Grafana 10.4+ accepts the JWT in
      # the Authorization header with the "Bearer " prefix auto-stripped;
      # the chart pins Grafana 13.0.1 so we're well past that floor.
      #
      # Same /api/auth/jwks the rest of romaine.life uses, so any token
      # the auth service mints — human session JWT, bot token, service
      # token from /api/auth/exchange/k8s — works here without per-token
      # configuration. Replaces the prior pattern of issuing per-caller
      # Grafana service-account tokens (glsa_...) for each scrape job.
      auth.jwt:
        enabled: true
        header_name: Authorization
        url_login: false
        jwk_set_url: https://auth.romaine.life/api/auth/jwks
        cache_ttl: 60m
        expect_claims: '{"iss": "https://auth.romaine.life"}'
        username_claim: email
        email_claim: email
        auto_sign_up: true
        role_attribute_path: "contains(['admin'], role) && 'Admin' || contains(['user'], role) && 'Viewer' || ''"
        role_attribute_strict: true
        skip_org_role_sync: false
      users:
        auto_assign_org: true
        auto_assign_org_role: Admin

    envValueFrom:
      GF_AUTH_GENERIC_OAUTH_CLIENT_ID:
        secretKeyRef:
          name: grafana-oauth
          key: client-id
      GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET:
        secretKeyRef:
          name: grafana-oauth
          key: client-secret

    # The chart auto-provisions a Prometheus datasource (default) pointing
    # at the in-cluster Prometheus, plus a sidecar that picks up the chart's
    # bundled dashboards as ConfigMaps. We only need to add Loki on top.
    additionalDataSources:
      - name: Loki
        uid: loki
        type: loki
        access: proxy
        url: http://loki-gateway.loki.svc.cluster.local
        isDefault: false
        jsonData:
          maxLines: 1000

    testFramework:
      enabled: false

  # ------------------------------------------------------------------------
  # AKS-hidden control plane components — kube-controller-manager,
  # kube-scheduler, kube-etcd, and kube-proxy aren't reachable as
  # user-scrapable endpoints, so their ServiceMonitors would just spam
  # "endpoints not found" alerts.
  # ------------------------------------------------------------------------
  kubeControllerManager:
    enabled: false
  kubeScheduler:
    enabled: false
  kubeEtcd:
    enabled: false
  kubeProxy:
    enabled: false

  # CoreDNS is the in-cluster DNS on AKS; the legacy kube-dns service isn't.
  coreDns:
    enabled: true
  kubeDns:
    enabled: false

  prometheusOperator:
    resources:
      requests:
        cpu: 25m
        memory: 96Mi
      limits:
        memory: 192Mi

  prometheus:
    prometheusSpec:
      retention: 15d
      retentionSize: 18GB

      # Discover ServiceMonitors / PodMonitors / Probes / Rules / ScrapeConfigs
      # from every namespace, not just the one this chart was installed into.
      # Without this, apps adding their own ServiceMonitor in their namespace
      # would be silently ignored.
      serviceMonitorSelectorNilUsesHelmValues: false
      podMonitorSelectorNilUsesHelmValues: false
      probeSelectorNilUsesHelmValues: false
      ruleSelectorNilUsesHelmValues: false
      scrapeConfigSelectorNilUsesHelmValues: false

      resources:
        requests:
          cpu: 100m
          memory: 384Mi
        limits:
          memory: 1Gi

      storageSpec:
        volumeClaimTemplate:
          spec:
            storageClassName: managed-csi
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: 20Gi

  alertmanager:
    alertmanagerSpec:
      resources:
        requests:
          cpu: 10m
          memory: 32Mi
        limits:
          memory: 96Mi

      storage:
        volumeClaimTemplate:
          spec:
            storageClassName: managed-csi
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: 2Gi

  kube-state-metrics:
    resources:
      requests:
        cpu: 10m
        memory: 96Mi
      limits:
        memory: 192Mi

  prometheus-node-exporter:
    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        memory: 64Mi
