kube-prometheus-stack:
  # ------------------------------------------------------------------------
  # Grafana — bundled subchart
  # ------------------------------------------------------------------------
  # Previously deployed as its own ArgoCD app (osms/k8s/grafana). Folded in
  # here so one chart owns the whole metrics+dashboards stack and the ~30
  # bundled dashboards land automatically via the sidecar. Grafana lives in
  # the `monitoring` namespace alongside Prometheus.
  grafana:
    enabled: true

    # Keep the Service name as `grafana` so the HTTPRoute backendRef stays
    # stable and doesn't need to know the Helm release name.
    fullnameOverride: grafana

    replicas: 1
    deploymentStrategy:
      type: Recreate

    persistence:
      enabled: true
      type: pvc
      storageClassName: managed-csi
      accessModes:
        - ReadWriteOnce
      size: 10Gi

    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        memory: 512Mi

    admin:
      existingSecret: grafana-admin
      userKey: admin-user
      passwordKey: admin-password

    grafana.ini:
      server:
        domain: grafana.romaine.life
        root_url: https://grafana.romaine.life/
      analytics:
        reporting_enabled: false
        check_for_updates: false
      auth:
        disable_login_form: false
      auth.generic_oauth:
        name: Microsoft
        enabled: true
        allow_sign_up: true
        auto_login: false
        client_authentication: client_secret_post
        scopes: openid email profile
        email_attribute_path: email || preferred_username || upn
        login_attribute_path: preferred_username || email || upn
        name_attribute_path: name
        auth_url: https://login.microsoftonline.com/common/oauth2/v2.0/authorize
        token_url: https://login.microsoftonline.com/common/oauth2/v2.0/token
        api_url: https://graph.microsoft.com/oidc/userinfo
        role_attribute_strict: true
        allow_assign_grafana_admin: false
        skip_org_role_sync: false
        use_pkce: true
      users:
        auto_assign_org: true
        auto_assign_org_role: Admin

    envValueFrom:
      GF_AUTH_GENERIC_OAUTH_CLIENT_ID:
        secretKeyRef:
          name: grafana-oauth
          key: client-id
      GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET:
        secretKeyRef:
          name: grafana-oauth
          key: client-secret
      GF_AUTH_GENERIC_OAUTH_ROLE_ATTRIBUTE_PATH:
        secretKeyRef:
          name: grafana-oauth
          key: role-attribute-path

    # The chart auto-provisions a Prometheus datasource (default) pointing
    # at the in-cluster Prometheus, plus a sidecar that picks up the chart's
    # bundled dashboards as ConfigMaps. We only need to add Loki on top.
    additionalDataSources:
      - name: Loki
        type: loki
        access: proxy
        url: http://loki-gateway.loki.svc.cluster.local
        isDefault: false
        jsonData:
          maxLines: 1000

    testFramework:
      enabled: false

  # ------------------------------------------------------------------------
  # AKS-hidden control plane components — kube-controller-manager,
  # kube-scheduler, kube-etcd, and kube-proxy aren't reachable as
  # user-scrapable endpoints, so their ServiceMonitors would just spam
  # "endpoints not found" alerts.
  # ------------------------------------------------------------------------
  kubeControllerManager:
    enabled: false
  kubeScheduler:
    enabled: false
  kubeEtcd:
    enabled: false
  kubeProxy:
    enabled: false

  # CoreDNS is the in-cluster DNS on AKS; the legacy kube-dns service isn't.
  coreDns:
    enabled: true
  kubeDns:
    enabled: false

  prometheusOperator:
    resources:
      requests:
        cpu: 25m
        memory: 96Mi
      limits:
        memory: 192Mi

  prometheus:
    prometheusSpec:
      retention: 15d
      retentionSize: 18GB

      # Discover ServiceMonitors / PodMonitors / Probes / Rules / ScrapeConfigs
      # from every namespace, not just the one this chart was installed into.
      # Without this, apps adding their own ServiceMonitor in their namespace
      # would be silently ignored.
      serviceMonitorSelectorNilUsesHelmValues: false
      podMonitorSelectorNilUsesHelmValues: false
      probeSelectorNilUsesHelmValues: false
      ruleSelectorNilUsesHelmValues: false
      scrapeConfigSelectorNilUsesHelmValues: false

      resources:
        requests:
          cpu: 100m
          memory: 384Mi
        limits:
          memory: 1Gi

      storageSpec:
        volumeClaimTemplate:
          spec:
            storageClassName: managed-csi
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: 20Gi

  alertmanager:
    alertmanagerSpec:
      resources:
        requests:
          cpu: 10m
          memory: 32Mi
        limits:
          memory: 96Mi

      storage:
        volumeClaimTemplate:
          spec:
            storageClassName: managed-csi
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: 2Gi

  kube-state-metrics:
    resources:
      requests:
        cpu: 10m
        memory: 96Mi
      limits:
        memory: 192Mi

  prometheus-node-exporter:
    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        memory: 64Mi
