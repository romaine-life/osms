kube-prometheus-stack:
  # Grafana lives in its own chart wrapper (k8s/grafana). Disable the bundled
  # subchart so we don't end up with two Grafanas.
  grafana:
    enabled: false

  # AKS hides the control plane — kube-controller-manager, kube-scheduler,
  # kube-etcd, and kube-proxy aren't reachable as user-scrapable endpoints,
  # so their ServiceMonitors would just spam "endpoints not found" alerts.
  kubeControllerManager:
    enabled: false
  kubeScheduler:
    enabled: false
  kubeEtcd:
    enabled: false
  kubeProxy:
    enabled: false

  # CoreDNS is the in-cluster DNS on AKS; the legacy kube-dns service isn't.
  coreDns:
    enabled: true
  kubeDns:
    enabled: false

  prometheusOperator:
    resources:
      requests:
        cpu: 25m
        memory: 96Mi
      limits:
        memory: 192Mi

  prometheus:
    prometheusSpec:
      retention: 15d
      retentionSize: 18GB

      # Discover ServiceMonitors / PodMonitors / Probes / Rules / ScrapeConfigs
      # from every namespace, not just the one this chart was installed into.
      # Without this, apps adding their own ServiceMonitor in their namespace
      # would be silently ignored.
      serviceMonitorSelectorNilUsesHelmValues: false
      podMonitorSelectorNilUsesHelmValues: false
      probeSelectorNilUsesHelmValues: false
      ruleSelectorNilUsesHelmValues: false
      scrapeConfigSelectorNilUsesHelmValues: false

      resources:
        requests:
          cpu: 100m
          memory: 384Mi
        limits:
          memory: 1Gi

      storageSpec:
        volumeClaimTemplate:
          spec:
            storageClassName: managed-csi
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: 20Gi

  alertmanager:
    alertmanagerSpec:
      resources:
        requests:
          cpu: 10m
          memory: 32Mi
        limits:
          memory: 96Mi

      storage:
        volumeClaimTemplate:
          spec:
            storageClassName: managed-csi
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: 2Gi

  kube-state-metrics:
    resources:
      requests:
        cpu: 10m
        memory: 96Mi
      limits:
        memory: 192Mi

  prometheus-node-exporter:
    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        memory: 64Mi
