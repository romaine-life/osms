apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: grafana
  namespace: grafana
spec:
  hostnames:
    - grafana.romaine.life
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: main
      namespace: envoy-gateway-system
    - group: gateway.networking.x-k8s.io
      kind: XListenerSet
      name: grafana
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            path:
              type: ReplaceFullPath
              replaceFullPath: /oauth2/start
            statusCode: 302
      matches:
        - path:
            type: Exact
            value: /login/azuread
    - backendRefs:
        - group: ""
          kind: Service
          name: grafana-oauth2-proxy
          port: 4180
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /oauth2
    - backendRefs:
        - group: ""
          kind: Service
          name: grafana
          port: 80
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /
