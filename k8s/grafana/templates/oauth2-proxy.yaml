apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana-oauth2-proxy
  namespace: grafana
  labels:
    app.kubernetes.io/name: grafana-oauth2-proxy
    app.kubernetes.io/instance: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: grafana-oauth2-proxy
      app.kubernetes.io/instance: grafana
  template:
    metadata:
      labels:
        app.kubernetes.io/name: grafana-oauth2-proxy
        app.kubernetes.io/instance: grafana
    spec:
      containers:
        - name: oauth2-proxy
          image: quay.io/oauth2-proxy/oauth2-proxy:v7.11.0
          imagePullPolicy: IfNotPresent
          args:
            - --http-address=0.0.0.0:4180
            - --provider=entra-id
            - --oidc-issuer-url=https://login.microsoftonline.com/common/v2.0
            - --insecure-oidc-skip-issuer-verification=true
            - --scope=openid profile email
            - --authenticated-emails-file=/etc/oauth2-proxy/allowed-emails
            - --redirect-url=https://grafana.romaine.life/oauth2/callback
            - --upstream=http://grafana.grafana.svc.cluster.local:80/
            - --reverse-proxy=true
            - --skip-provider-button=true
            - --pass-user-headers=true
            - --set-xauthrequest=true
            - --cookie-secure=true
            - --cookie-samesite=lax
            - --cookie-expire=168h
            - --cookie-refresh=1h
          env:
            - name: OAUTH2_PROXY_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: grafana-oauth
                  key: client-id
            - name: OAUTH2_PROXY_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: grafana-oauth
                  key: client-secret
            - name: OAUTH2_PROXY_COOKIE_SECRET
              valueFrom:
                secretKeyRef:
                  name: grafana-oauth
                  key: cookie-secret
          ports:
            - name: http
              containerPort: 4180
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /ping
              port: http
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /ping
              port: http
            periodSeconds: 30
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsNonRoot: true
            runAsUser: 65532
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: oauth
              mountPath: /etc/oauth2-proxy
              readOnly: true
      volumes:
        - name: oauth
          secret:
            secretName: grafana-oauth
            items:
              - key: allowed-emails
                path: allowed-emails
---
apiVersion: v1
kind: Service
metadata:
  name: grafana-oauth2-proxy
  namespace: grafana
  labels:
    app.kubernetes.io/name: grafana-oauth2-proxy
    app.kubernetes.io/instance: grafana
spec:
  selector:
    app.kubernetes.io/name: grafana-oauth2-proxy
    app.kubernetes.io/instance: grafana
  ports:
    - name: http
      port: 4180
      targetPort: http
